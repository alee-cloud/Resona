<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Music Tone Prototype - V1</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app">
      <h1>Music Tone Prototype (Version 1)</h1>
      <p class="subtitle">
        Upload an audio file, then use simple tone buttons like “darker” or
        “warmer”.
      </p>

      <section class="panel">
        <label for="audioFile">1) Upload audio file</label>
        <input id="audioFile" type="file" accept="audio/*" />
      </section>

      <section class="panel">
        <label>2) Playback</label>
        <button id="playPauseBtn" disabled>Play</button>
      </section>

      <section class="panel">
        <label>3) Tone controls</label>
        <div class="button-row">
          <button class="effect-btn" data-effect="darker" disabled>
            Make darker
          </button>
          <button class="effect-btn" data-effect="brighter" disabled>
            Make brighter
          </button>
          <button class="effect-btn" data-effect="warmer" disabled>
            Make warmer
          </button>
          <button class="effect-btn" data-effect="louder" disabled>
            Make louder
          </button>
          <button id="resetBtn" disabled>Reset</button>
        </div>
      </section>

      <section class="panel">
        <label>What happened?</label>
        <p id="statusText">Upload a file to begin.</p>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
